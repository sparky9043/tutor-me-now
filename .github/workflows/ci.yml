name: Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm install
        working-directory: client
      - name: Check styles
        run: npm run lint
        working-directory: client
      - name: Run test
        run: npm run test
        working-directory: client